version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hms_mysql
    restart: always
    environment:
      MYSQL_DATABASE: hms_db
      MYSQL_ROOT_PASSWORD: root_password_2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms_backend
    restart: always
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=lifeflow_jwt_secret_token_key_for_hms_application_2026
      - JWT_REFRESH_SECRET=lifeflow_refresh_token_secret_key_2026
      - DB_DIALECT=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=hms_db
      - DB_USER=root
      - DB_PASSWORD=root_password_2026
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: hms_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  mysql_data:
